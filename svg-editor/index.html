<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0d0d1a">
    <title>SVGドット絵エディタ</title>
    <style>
        :root {
            --bg: #0d0d1a;
            --panel: #141428;
            --panel2: #1c1c38;
            --border: #2a2a50;
            --accent: #e94560;
            --accent2: #4a9eff;
            --accent3: #2ecc71;
            --text: #d0d0e8;
            --text-dim: #7070a0;
            --bottom-h: 56px;
            --panel-h: 260px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            font-size: 13px;
        }

        /* ============ 共通部品 ============ */
        .btn {
            background: var(--panel2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 7px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            touch-action: manipulation;
            transition: background 0.15s;
            white-space: nowrap;
        }

        .btn:active,
        .btn:hover {
            background: var(--border);
        }

        .btn.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .btn.primary:hover {
            background: #c0304e;
        }

        .btn.success {
            background: var(--accent3);
            border-color: var(--accent3);
            color: #fff;
        }

        .btn.success:hover {
            background: #25a25a;
        }

        .panel-title {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .spacer {
            flex: 1;
        }

        /* ============ ヘッダー ============ */
        #header {
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            padding: 0 10px;
            height: 44px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 20;
            overflow: hidden;
        }

        #header h1 {
            font-size: 14px;
            font-weight: bold;
            color: var(--accent);
            white-space: nowrap;
        }

        #header select {
            background: var(--panel2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 3px 5px;
            border-radius: 4px;
            font-size: 12px;
        }

        .hbtn {
            background: var(--panel2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 5px 9px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            white-space: nowrap;
            touch-action: manipulation;
            transition: background 0.15s;
        }

        .hbtn:hover {
            background: var(--border);
        }

        .hbtn.accent {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .hbtn.accent:hover {
            background: #c0304e;
        }

        #header-color-dot {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.4);
            flex-shrink: 0;
            cursor: pointer;
            transition: transform 0.1s;
        }

        #header-color-dot:hover {
            transform: scale(1.1);
        }

        /* ============ PC レイアウト (CSS Grid) ============ */
        @media (min-width: 768px) {
            #app {
                display: grid;
                grid-template-rows: 44px 1fr;
                grid-template-columns: 1fr 220px;
                height: 100vh;
            }

            #header {
                grid-column: 1 / -1;
                grid-row: 1;
            }

            #canvas-area {
                grid-column: 1;
                grid-row: 2;
            }

            #pc-right {
                grid-column: 2;
                grid-row: 2;
                display: flex;
                flex-direction: column;
                overflow: hidden;
                background: var(--panel);
                border-left: 1px solid var(--border);
            }

            /* モバイル専用要素を非表示 */
            #side-panel,
            #tab-bar {
                display: none !important;
            }
        }

        /* ============ モバイル レイアウト ============ */
        @media (max-width: 767px) {
            #app {
                display: flex;
                flex-direction: column;
                height: 100%;
            }

            #canvas-area {
                flex: 1;
                min-height: 0;
            }

            #pc-right {
                display: none !important;
            }
        }

        /* ============ キャンバスエリア ============ */
        #canvas-area {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: repeating-conic-gradient(#141428 0% 25%, #1a1a30 0% 50%) 0 0 / 20px 20px;
            touch-action: none;
        }

        #canvas-wrap {
            position: relative;
            touch-action: none;
        }

        #main-canvas {
            display: block;
            image-rendering: pixelated;
            touch-action: none;
        }

        #cursor-info {
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            color: var(--text-dim);
            pointer-events: none;
        }

        #zoom-bar {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 20px;
            padding: 3px 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #zoom-bar button {
            background: none;
            border: none;
            color: var(--text);
            font-size: 18px;
            cursor: pointer;
            padding: 0 2px;
            touch-action: manipulation;
        }

        #zoom-bar span {
            font-size: 11px;
            color: var(--text-dim);
            min-width: 26px;
            text-align: center;
        }

        /* ============ PCサイド ============ */
        #pc-right {
            overflow-y: auto;
        }

        #pc-right::-webkit-scrollbar {
            width: 4px;
        }

        #pc-right::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .pc-section {
            padding: 10px;
            border-bottom: 1px solid var(--border);
        }

        /* PCツールグリッド */
        #pc-tools-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
        }

        .tool-cell {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            padding: 6px 4px;
            border-radius: 6px;
            cursor: pointer;
            background: var(--panel2);
            border: 1px solid var(--border);
            min-height: 48px;
            touch-action: manipulation;
            transition: all 0.15s;
        }

        .tool-cell .icon {
            font-size: 18px;
        }

        .tool-cell .lbl {
            font-size: 9px;
            color: var(--text-dim);
        }

        .tool-cell.active {
            background: var(--accent);
            border-color: var(--accent);
        }

        .tool-cell.active .lbl {
            color: rgba(255, 255, 255, 0.8);
        }

        /* PCパレット */
        #pc-palette-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
            margin-bottom: 8px;
        }

        .color-swatch {
            aspect-ratio: 1;
            border-radius: 4px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.1s;
        }

        .color-swatch:hover {
            transform: scale(1.1);
        }

        .color-swatch.selected {
            border-color: #fff;
            box-shadow: 0 0 0 1px #fff;
        }

        .color-actions {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .color-box-btn {
            width: 34px;
            height: 34px;
            border-radius: 6px;
            border: 2px solid var(--border);
            cursor: pointer;
            flex-shrink: 0;
            transition: transform 0.1s;
        }

        .color-box-btn:hover {
            transform: scale(1.05);
        }

        /* PCフレーム */
        .frames-top {
            display: flex;
            gap: 4px;
            margin-bottom: 8px;
        }

        #pc-frame-list {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
        }

        .frame-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 4px;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            background: var(--panel2);
            transition: border-color 0.15s;
        }

        .frame-card:hover {
            border-color: var(--border);
        }

        .frame-card.active {
            border-color: var(--accent2);
        }

        .frame-thumb-bg {
            width: 100%;
            aspect-ratio: 1;
            background: repeating-conic-gradient(#222 0% 25%, #333 0% 50%) 0 0 / 6px 6px;
            border-radius: 3px;
            overflow: hidden;
        }

        .frame-thumb {
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: pixelated;
        }

        .frame-lbl {
            font-size: 9px;
            color: var(--text-dim);
        }

        .frame-actions-row {
            display: flex;
            gap: 2px;
            width: 100%;
        }

        .frame-move-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: var(--text);
            font-size: 10px;
            cursor: pointer;
            padding: 1px 4px;
            border-radius: 3px;
            flex: 1;
            touch-action: manipulation;
        }

        .frame-move-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.2);
        }

        .frame-move-btn:disabled {
            opacity: 0.2;
            cursor: default;
        }

        .frame-del-btn {
            background: rgba(231, 76, 60, 0.1);
            border: none;
            color: #e74c3c;
            font-size: 10px;
            cursor: pointer;
            padding: 1px 4px;
            border-radius: 3px;
            flex: 1;
            touch-action: manipulation;
        }

        .frame-del-btn:hover {
            background: rgba(231, 76, 60, 0.25);
        }

        /* PCプレビュー */
        #pc-preview-canvas {
            display: block;
            image-rendering: pixelated;
            border-radius: 4px;
            margin: 0 auto 8px;
            background: repeating-conic-gradient(#222 0% 25%, #333 0% 50%) 0 0/6px 6px;
        }

        .fps-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
        }

        .fps-row label {
            font-size: 11px;
            color: var(--text-dim);
        }

        .fps-row input {
            width: 44px;
            background: var(--panel2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 3px;
            border-radius: 4px;
            font-size: 12px;
        }

        /* PCエクスポート */
        #pc-export-output {
            width: 100%;
            height: 70px;
            background: var(--panel2);
            border: 1px solid var(--border);
            color: #7fba00;
            font-family: monospace;
            font-size: 9px;
            padding: 5px;
            border-radius: 4px;
            resize: none;
        }

        /* ============ モバイル専用 ============ */
        #side-panel {
            background: var(--panel);
            border-top: 1px solid var(--border);
            height: var(--panel-h);
            overflow: hidden;
            transition: height 0.22s ease;
            flex-shrink: 0;
        }

        #side-panel.collapsed {
            height: 0;
        }

        .tab-pane {
            display: none;
            height: 100%;
            overflow-y: auto;
            padding: 10px;
        }

        .tab-pane.active {
            display: block;
        }

        .tab-pane::-webkit-scrollbar {
            width: 4px;
        }

        .tab-pane::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        /* タブバー */
        #tab-bar {
            background: var(--panel);
            border-top: 1px solid var(--border);
            height: var(--bottom-h);
            display: flex;
            flex-shrink: 0;
            z-index: 20;
        }

        .tab-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--text-dim);
            font-size: 10px;
            padding: 6px 0;
            touch-action: manipulation;
            transition: color 0.15s;
        }

        .tab-btn .icon {
            font-size: 20px;
            line-height: 1;
        }

        .tab-btn.active {
            color: var(--accent2);
        }

        /* モバイルツール */
        #mob-tools-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
        }

        .mob-tool {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            padding: 7px 4px;
            border-radius: 7px;
            cursor: pointer;
            background: var(--panel2);
            border: 1px solid var(--border);
            min-height: 52px;
            touch-action: manipulation;
            transition: all 0.12s;
        }

        .mob-tool .icon {
            font-size: 20px;
        }

        .mob-tool .lbl {
            font-size: 9px;
            color: var(--text-dim);
        }

        .mob-tool.active {
            background: var(--accent);
            border-color: var(--accent);
        }

        .mob-tool.active .lbl {
            color: rgba(255, 255, 255, 0.8);
        }

        .mob-tool.wide {
            grid-column: span 2;
        }

        .mob-divider {
            grid-column: 1 / -1;
            height: 1px;
            background: var(--border);
            margin: 2px 0;
        }

        /* モバイルパレット */
        #mob-palette-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 4px;
            margin-bottom: 8px;
        }

        /* モバイルフレーム */
        #mob-frame-list {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
        }

        /* モバイルエクスポート */
        .mob-preview-row {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        #mob-preview-canvas {
            image-rendering: pixelated;
            border-radius: 5px;
            flex-shrink: 0;
            background: repeating-conic-gradient(#222 0% 25%, #333 0% 50%) 0 0/6px 6px;
        }

        .mob-preview-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        #mob-export-output {
            width: 100%;
            height: 80px;
            background: var(--panel2);
            border: 1px solid var(--border);
            color: #7fba00;
            font-family: monospace;
            font-size: 9px;
            padding: 5px;
            border-radius: 5px;
            resize: none;
        }
    </style>
</head>

<body>
    <div id="app">

        <!-- ===== ヘッダー ===== -->
        <div id="header">
            <h1>🎨 ドット絵</h1>
            <select id="grid-size-select">
                <option value="16x16">16×16</option>
                <option value="32x32" selected>32×32</option>
                <option value="48x48">48×48</option>
                <option value="64x64">64×64</option>
            </select>
            <input type="color" id="color-picker-input" style="position:absolute;opacity:0;width:0;height:0;"
                onchange="onColorPickerChange(this.value)">
            <div class="spacer"></div>
            <button class="hbtn" onclick="undo()">↩ 戻す</button>
            <button class="hbtn" onclick="redo()">↪ やり直し</button>
            <input type="file" id="svg-import-input" accept=".svg,image/svg+xml"
                style="position:absolute;opacity:0;width:0;height:0;" onchange="importSVG(this)">
        </div>

        <!-- ===== キャンバスエリア ===== -->
        <div id="canvas-area">
            <div id="canvas-wrap">
                <canvas id="main-canvas"></canvas>
            </div>
            <div id="cursor-info">—</div>
            <div id="zoom-bar">
                <button onclick="zoom(-1)">－</button>
                <span id="zoom-label">×8</span>
                <button onclick="zoom(1)">＋</button>
            </div>
        </div>

        <!-- ===== モバイル スライドパネル ===== -->
        <div id="side-panel">
            <!-- ツール -->
            <div id="pane-tools" class="tab-pane active">
                <div id="mob-tools-grid">
                    <div class="mob-tool active" data-tool="draw" onclick="selectTool(this)"><span
                            class="icon">✏️</span><span class="lbl">鉛筆(B)</span></div>
                    <div class="mob-tool" data-tool="erase" onclick="selectTool(this)"><span class="icon">🧹</span><span
                            class="lbl">消去(E)</span></div>
                    <div class="mob-tool" data-tool="fill" onclick="selectTool(this)"><span class="icon">🪣</span><span
                            class="lbl">塗潰(F)</span></div>
                    <div class="mob-tool" data-tool="picker" onclick="selectTool(this)"><span
                            class="icon">💉</span><span class="lbl">スポイト(K)</span></div>
                    <div class="mob-tool" data-tool="line" onclick="selectTool(this)"><span class="icon">📏</span><span
                            class="lbl">直線(L)</span></div>
                    <div class="mob-tool" onclick="toggleGrid()"><span class="icon">#</span><span
                            class="lbl">グリッド(G)</span></div>
                    <div class="mob-tool" data-tool="select" onclick="selectTool(this)"><span class="icon">⬚</span><span
                            class="lbl">選択(S)</span></div>
                    <div class="mob-tool" onclick="flipH()"><span class="icon">↔</span><span class="lbl">反転H</span>
                    </div>
                    <div class="mob-tool" onclick="flipV()"><span class="icon">↕</span><span class="lbl">反転V</span>
                    </div>
                    <div class="mob-divider"></div>
                    <div class="mob-tool wide" onclick="clearFrame()"><span class="icon">🗑</span><span
                            class="lbl">クリア</span></div>
                    <div class="mob-tool wide" onclick="exportSpritesheet()"><span class="icon">🖼</span><span
                            class="lbl">スプライト出力</span></div>
                </div>
            </div>
            <!-- カラー -->
            <div id="pane-colors" class="tab-pane">
                <div class="color-actions" style="margin-bottom:8px;">
                    <div class="color-box-btn" id="mob-color-box" onclick="openColorPicker()" title="クリックで色選択"></div>
                    <span style="font-size:11px;color:var(--text-dim);flex:1;">現在の色</span>
                    <button class="btn" style="font-size:12px;" onclick="addCurrentColorToPalette()">＋追加</button>
                    <button class="btn" style="font-size:12px;color:#e74c3c;border-color:#e74c3c;"
                        onclick="deletePaletteColor()">🗑</button>
                </div>
                <button class="btn" style="width:100%;font-size:11px;margin-bottom:8px;"
                    onclick="addAllUsedColorsToPalette()">🔍 描画中の色を全て追加</button>
                <div id="mob-palette-grid"></div>
            </div>
            <!-- フレーム -->
            <div id="pane-frames" class="tab-pane">
                <div class="frames-top">
                    <button class="btn" style="flex:1;" onclick="addFrame()">＋フレーム追加</button>
                    <button class="btn" onclick="duplicateFrame()">📋 複製</button>
                </div>
                <div id="mob-frame-list"></div>
            </div>
            <!-- 出力 -->
            <div id="pane-export" class="tab-pane">
                <div class="mob-preview-row">
                    <canvas id="mob-preview-canvas" width="72" height="72"></canvas>
                    <div class="mob-preview-right">
                        <div class="fps-row">
                            <label>FPS</label>
                            <input type="number" id="mob-fps" value="8" min="1" max="60" onchange="restartAnim()">
                            <button class="btn" id="mob-anim-btn" onclick="toggleAnim()" style="flex:1;">▶ 再生</button>
                        </div>
                        <button class="btn primary" onclick="exportCurrentSVG()">📤 現在コマSVG</button>
                        <button class="btn success" onclick="exportSpritesheet()">全コマシート</button>
                        <button class="btn" onclick="triggerImport()">📂 ファイルをインポート</button>
                    </div>
                </div>
                <textarea id="mob-export-output" placeholder="SVGコードをここに貼り付けてインポートもできます"></textarea>
                <div style="display:flex;gap:5px;margin-top:6px;">
                    <button class="btn" style="flex:1;" onclick="copyExport()">📋 コピー</button>
                    <button class="btn" style="flex:1;" onclick="importFromText('mob-export-output')">⬆
                        コードをインポート</button>
                </div>
            </div>
        </div>

        <!-- ===== モバイル タブバー ===== -->
        <div id="tab-bar">
            <button class="tab-btn active" data-pane="tools" onclick="switchTab(this)"><span
                    class="icon">🔧</span>ツール</button>
            <button class="tab-btn" data-pane="colors" onclick="switchTab(this)"><span
                    class="icon">🎨</span>カラー</button>
            <button class="tab-btn" data-pane="frames" onclick="switchTab(this)"><span
                    class="icon">🖼</span>フレーム</button>
            <button class="tab-btn" data-pane="export" onclick="switchTab(this)"><span class="icon">📤</span>出力</button>
        </div>

        <!-- ===== PC サイドパネル ===== -->
        <div id="pc-right">
            <!-- ツール -->
            <div class="pc-section">
                <div class="panel-title">ツール</div>
                <div id="pc-tools-grid">
                    <div class="tool-cell active" data-tool="draw" onclick="selectTool(this)"><span
                            class="icon">✏️</span><span class="lbl">鉛筆(B)</span></div>
                    <div class="tool-cell" data-tool="erase" onclick="selectTool(this)"><span
                            class="icon">🧹</span><span class="lbl">消去(E)</span></div>
                    <div class="tool-cell" data-tool="fill" onclick="selectTool(this)"><span class="icon">🪣</span><span
                            class="lbl">塗潰(F)</span></div>
                    <div class="tool-cell" data-tool="picker" onclick="selectTool(this)"><span
                            class="icon">💉</span><span class="lbl">スポイト(K)</span></div>
                    <div class="tool-cell" data-tool="line" onclick="selectTool(this)"><span class="icon">📏</span><span
                            class="lbl">直線(L)</span></div>
                    <div class="tool-cell" onclick="toggleGrid()"><span class="icon">#</span><span
                            class="lbl">グリッド(G)</span></div>
                    <div class="tool-cell" data-tool="select" onclick="selectTool(this)"><span
                            class="icon">⬚</span><span class="lbl">選択(S)</span></div>
                    <div class="tool-cell" onclick="flipH()"><span class="icon">↔</span><span class="lbl">反転H</span>
                    </div>
                    <div class="tool-cell" onclick="flipV()"><span class="icon">↕</span><span class="lbl">反転V</span>
                    </div>
                </div>
            </div>
            <!-- カラー -->
            <div class="pc-section">
                <div class="panel-title">カラーパレット</div>
                <div class="color-actions" style="margin-bottom:8px;">
                    <div class="color-box-btn" id="pc-color-box" onclick="openColorPicker()" title="クリックで色選択"></div>
                    <span style="font-size:11px;color:var(--text-dim);flex:1;">現在の色</span>
                    <button class="btn" style="font-size:11px;" onclick="addCurrentColorToPalette()">＋追加</button>
                    <button class="btn" style="font-size:11px;color:#e74c3c;border-color:#e74c3c;"
                        onclick="deletePaletteColor()">🗑</button>
                </div>
                <button class="btn" style="width:100%;font-size:11px;margin-bottom:8px;"
                    onclick="addAllUsedColorsToPalette()">🔍 描画中の色を全て追加</button>
                <div id="pc-palette-grid"></div>
            </div>
            <!-- フレーム -->
            <div class="pc-section">
                <div class="panel-title">フレーム</div>
                <div class="frames-top">
                    <button class="btn" style="flex:1;font-size:11px;" onclick="addFrame()">＋追加</button>
                    <button class="btn" style="font-size:11px;" onclick="duplicateFrame()">📋 複製</button>
                </div>
                <div id="pc-frame-list"></div>
            </div>
            <!-- プレビュー & 出力 -->
            <div class="pc-section">
                <div class="panel-title">プレビュー</div>
                <canvas id="pc-preview-canvas" width="64" height="64"></canvas>
                <div class="fps-row">
                    <label>FPS</label>
                    <input type="number" id="pc-fps" value="8" min="1" max="60" onchange="restartAnim()">
                    <button class="btn" id="pc-anim-btn" onclick="toggleAnim()" style="flex:1;font-size:11px;">▶
                        再生</button>
                </div>
                <button class="btn primary" style="width:100%;font-size:11px;margin-bottom:4px;"
                    onclick="exportCurrentSVG()">📤 現在コマSVG生成</button>
                <button class="btn success" style="width:100%;font-size:11px;margin-bottom:6px;"
                    onclick="exportSpritesheet()">全コマスプライト出力</button>
                <button class="btn" style="width:100%;font-size:11px;margin-bottom:6px;" onclick="triggerImport()">📂
                    ファイルをインポート</button>
                <textarea id="pc-export-output" placeholder="SVGコードをここに貼り付けてインポートもできます"></textarea>
                <div style="display:flex;gap:4px;margin-top:4px;">
                    <button class="btn" style="flex:1;font-size:11px;" onclick="copyExport()">📋 コピー</button>
                    <button class="btn" style="flex:1;font-size:11px;" onclick="importFromText('pc-export-output')">⬆
                        コードをインポート</button>
                </div>
            </div>
        </div>

    </div><!-- #app -->

    <script>
        // ============================================================
        // 定数 & 初期状態
        // ============================================================
        const PALETTE_DEFAULTS = ['#000000', '#ffffff'];

        const S = {
            gridW: 32, gridH: 32,
            frames: [], currentFrameIdx: 0,
            currentColor: '#e74c3c',
            tool: 'draw',
            palette: [...PALETTE_DEFAULTS],
            showGrid: true,
            cellSize: 14,
            isDrawing: false, drawStartX: -1, drawStartY: -1,
            selPhase: 'none', selX1: 0, selY1: 0, selX2: 0, selY2: 0,
            selNX: 0, selNY: 0, selNW: 0, selNH: 0,
            selBuffer: null, selOffX: 0, selOffY: 0,
            linePreviewPx: [],
            animPlaying: false, animFrameIdx: 0, animTimer: null,
            undoStack: [], redoStack: [],
            pinchDist: null,
        };

        const createFrame = (w, h) => Array.from({ length: h }, () => Array(w).fill(null));
        const cloneFrame = f => f.map(r => [...r]);
        const cloneAll = () => S.frames.map(cloneFrame);

        // ============================================================
        // 初期化
        // ============================================================
        function init() {
            S.frames = [createFrame(S.gridW, S.gridH)];
            renderPalette();
            renderFrameLists();
            resizeCanvas();
            renderCanvas();
            renderPreviews();
            updateColorUI();
        }

        window.addEventListener('resize', () => { resizeCanvas(); renderCanvas(); });

        // ============================================================
        // モバイルタブ切り替え
        // ============================================================
        let panelOpen = true;
        function switchTab(btn) {
            const paneId = btn.dataset.pane;
            const panel = document.getElementById('side-panel');
            if (btn.classList.contains('active')) {
                panelOpen = !panelOpen;
                panel.classList.toggle('collapsed', !panelOpen);
                return;
            }
            document.querySelectorAll('#tab-bar .tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            const target = document.getElementById(`pane-${paneId}`);
            if (target) { target.classList.add('active'); }
            panelOpen = true; panel.classList.remove('collapsed');
        }

        // ============================================================
        // グリッドサイズ変更
        // ============================================================
        document.getElementById('grid-size-select').addEventListener('change', function () {
            const [w, h] = this.value.split('x').map(Number);
            if (!confirm(`グリッドサイズを ${w}×${h} に変更します。\n現在の内容がリセットされます。`)) {
                this.value = `${S.gridW}x${S.gridH}`; return;
            }
            S.gridW = w; S.gridH = h;
            S.frames = [createFrame(w, h)]; S.currentFrameIdx = 0;
            S.undoStack = []; S.redoStack = [];
            resizeCanvas(); renderFrameLists(); renderCanvas();
        });

        // ============================================================
        // キャンバスサイズ調整
        // ============================================================
        function resizeCanvas() {
            const area = document.getElementById('canvas-area');
            const maxW = area.clientWidth - 24;
            const maxH = area.clientHeight - 24;
            S.cellSize = Math.max(2, Math.min(30, Math.floor(Math.min(maxW / S.gridW, maxH / S.gridH))));
            const c = document.getElementById('main-canvas');
            c.width = S.gridW * S.cellSize;
            c.height = S.gridH * S.cellSize;
            document.getElementById('zoom-label').textContent = `×${S.cellSize}`;
        }

        function zoom(dir) {
            S.cellSize = Math.max(2, Math.min(40, S.cellSize + dir * 2));
            const c = document.getElementById('main-canvas');
            c.width = S.gridW * S.cellSize;
            c.height = S.gridH * S.cellSize;
            document.getElementById('zoom-label').textContent = `×${S.cellSize}`;
            renderCanvas();
        }

        // ============================================================
        // キャンバス描画
        // ============================================================
        function renderCanvas() {
            const c = document.getElementById('main-canvas');
            const ctx = c.getContext('2d');
            const cs = S.cellSize;
            const frame = S.frames[S.currentFrameIdx];
            if (!frame) return;

            // チェッカーボード（透明背景）
            for (let y = 0; y < S.gridH; y++) {
                for (let x = 0; x < S.gridW; x++) {
                    ctx.fillStyle = ((x + y) % 2 === 0) ? '#1a1a30' : '#2a2a40';
                    ctx.fillRect(x * cs, y * cs, cs, cs);
                }
            }
            // ピクセル
            for (let y = 0; y < S.gridH; y++) {
                for (let x = 0; x < S.gridW; x++) {
                    const col = frame[y][x];
                    if (col) { ctx.fillStyle = col; ctx.fillRect(x * cs, y * cs, cs, cs); }
                }
            }
            // 直線プレビュー
            ctx.globalAlpha = 0.6;
            for (const [px, py] of S.linePreviewPx) {
                ctx.fillStyle = S.currentColor;
                ctx.fillRect(px * cs, py * cs, cs, cs);
            }
            ctx.globalAlpha = 1.0;
            // 選択バッファ描画（移動中オーバーレイ）
            if (S.selPhase === 'selected' || S.selPhase === 'moving') {
                const buf = S.selBuffer; if (buf) {
                    const dx = S.selNX + S.selOffX, dy = S.selNY + S.selOffY;
                    for (let r = 0; r < buf.length; r++)
                        for (let c2 = 0; c2 < buf[r].length; c2++) {
                            const col2 = buf[r][c2]; if (!col2) continue;
                            ctx.fillStyle = col2;
                            ctx.fillRect((dx + c2) * cs, (dy + r) * cs, cs, cs);
                        }
                }
                // 選択矩形（点線）
                const rx = (S.selNX + S.selOffX) * cs, ry = (S.selNY + S.selOffY) * cs;
                const rw = S.selNW * cs, rh = S.selNH * cs;
                ctx.save(); ctx.setLineDash([4, 3]); ctx.lineWidth = 1.5;
                ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.strokeRect(rx, ry, rw, rh);
                ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.setLineDash([4, 3]); ctx.lineDashOffset = 4;
                ctx.strokeRect(rx, ry, rw, rh); ctx.restore();
            } else if (S.selPhase === 'selecting') {
                // ドラッグ中の選択矩形プレビュー
                const x1 = Math.min(S.selX1, S.selX2) * cs, y1 = Math.min(S.selY1, S.selY2) * cs;
                const w2 = (Math.abs(S.selX2 - S.selX1) + 1) * cs, h2 = (Math.abs(S.selY2 - S.selY1) + 1) * cs;
                ctx.save(); ctx.setLineDash([4, 3]); ctx.lineWidth = 1.5;
                ctx.strokeStyle = 'rgba(80,200,255,0.9)'; ctx.strokeRect(x1, y1, w2, h2); ctx.restore();
            }
            // グリッド線
            if (S.showGrid && cs >= 4) {
                ctx.strokeStyle = 'rgba(255,255,255,0.20)'; ctx.lineWidth = 0.5;
                for (let x = 0; x <= S.gridW; x++) { ctx.beginPath(); ctx.moveTo(x * cs, 0); ctx.lineTo(x * cs, c.height); ctx.stroke(); }
                for (let y = 0; y <= S.gridH; y++) { ctx.beginPath(); ctx.moveTo(0, y * cs); ctx.lineTo(c.width, y * cs); ctx.stroke(); }
            }
        }

        function drawPreviewToCanvas(canvas, frame) {
            if (!canvas || !frame) return;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const cw = canvas.width / S.gridW;
            const ch = canvas.height / S.gridH;
            for (let y = 0; y < S.gridH; y++) {
                for (let x = 0; x < S.gridW; x++) {
                    const col = frame[y][x];
                    if (col) { ctx.fillStyle = col; ctx.fillRect(x * cw, y * ch, cw, ch); }
                }
            }
        }

        function renderPreviews() {
            const frame = S.animPlaying ? S.frames[S.animFrameIdx % S.frames.length] : S.frames[S.currentFrameIdx];
            drawPreviewToCanvas(document.getElementById('mob-preview-canvas'), frame);
            drawPreviewToCanvas(document.getElementById('pc-preview-canvas'), frame);
        }

        function updateThumb(idx) {
            const frame = S.frames[idx];
            drawPreviewToCanvas(document.getElementById(`mob-thumb-${idx}`), frame);
            drawPreviewToCanvas(document.getElementById(`pc-thumb-${idx}`), frame);
        }

        // ============================================================
        // 入力処理
        // ============================================================
        function getCell(clientX, clientY) {
            const rect = document.getElementById('main-canvas').getBoundingClientRect();
            const x = Math.floor((clientX - rect.left) / S.cellSize);
            const y = Math.floor((clientY - rect.top) / S.cellSize);
            return (x >= 0 && y >= 0 && x < S.gridW && y < S.gridH) ? { x, y } : null;
        }

        function brezLine(x0, y0, x1, y1) {
            const pts = []; let dx = Math.abs(x1 - x0), sx = x0 < x1 ? 1 : -1, dy = -Math.abs(y1 - y0), sy = y0 < y1 ? 1 : -1, err = dx + dy;
            while (true) { pts.push([x0, y0]); if (x0 === x1 && y0 === y1) break; const e2 = 2 * err; if (e2 >= dy) { err += dy; x0 += sx; } if (e2 <= dx) { err += dx; y0 += sy; } }
            return pts;
        }

        function putPixel(x, y, col) { S.frames[S.currentFrameIdx][y][x] = col; }

        function floodFill(sx, sy, newC) {
            const frame = S.frames[S.currentFrameIdx];
            const orig = frame[sy][sx];
            if (orig === newC) return;
            const q = [[sx, sy]], vis = new Set();
            while (q.length) {
                const [x, y] = q.shift(), k = `${x},${y}`;
                if (vis.has(k) || x < 0 || y < 0 || x >= S.gridW || y >= S.gridH || frame[y][x] !== orig) continue;
                vis.add(k); frame[y][x] = newC;
                q.push([x + 1, y], [x - 1, y], [x, y + 1], [x, y - 1]);
            }
        }

        function handlePointerDown(cx, cy, isRight) {
            const cell = getCell(cx, cy); if (!cell) return;
            if (S.tool === 'select') { selToolDown(cell.x, cell.y); return; }
            if (S.tool === 'picker') {
                const col = S.frames[S.currentFrameIdx][cell.y][cell.x];
                if (col) { S.currentColor = col; updateColorUI(); renderPalette(); } return;
            }
            pushUndo(); S.isDrawing = true; S.drawStartX = cell.x; S.drawStartY = cell.y;
            const col = (isRight || S.tool === 'erase') ? null : S.currentColor;
            if (S.tool === 'fill') {
                floodFill(cell.x, cell.y, col); afterDraw(); return;
            }
            if (S.tool !== 'line') { putPixel(cell.x, cell.y, col); afterDraw(); }
        }

        function handlePointerMove(cx, cy) {
            const cell = getCell(cx, cy);
            if (cell) document.getElementById('cursor-info').textContent = `${cell.x}, ${cell.y}`;
            if (S.tool === 'select') { if (cell) selToolMove(cell.x, cell.y); return; }
            if (!S.isDrawing || !cell) return;
            if (S.tool === 'line') {
                S.linePreviewPx = brezLine(S.drawStartX, S.drawStartY, cell.x, cell.y);
                renderCanvas(); return;
            }
            if (S.tool === 'draw' || S.tool === 'erase') {
                putPixel(cell.x, cell.y, S.tool === 'erase' ? null : S.currentColor); renderCanvas();
            }
        }

        function handlePointerUp(cx, cy) {
            if (S.tool === 'select') { selToolUp(); return; }
            if (!S.isDrawing) return;
            if (S.tool === 'line') {
                const cell = (cx !== null) ? getCell(cx, cy) : null;
                if (cell) S.linePreviewPx = brezLine(S.drawStartX, S.drawStartY, cell.x, cell.y);
                S.linePreviewPx.forEach(([px, py]) => putPixel(px, py, S.currentColor));
                S.linePreviewPx = [];
            }
            S.isDrawing = false; afterDraw();
        }

        // -- 選択ツール ヘルパー --
        function selToolDown(x, y) {
            if (S.selPhase === 'selected' || S.selPhase === 'moving') {
                const inSel = x >= S.selNX + S.selOffX && x < S.selNX + S.selOffX + S.selNW &&
                    y >= S.selNY + S.selOffY && y < S.selNY + S.selOffY + S.selNH;
                if (inSel) {
                    S.selPhase = 'moving';
                    S._selDragStartX = x; S._selDragStartY = y;
                    S._selBaseOffX = S.selOffX; S._selBaseOffY = S.selOffY;
                } else {
                    commitSelection();
                    S._pendingNewSel = true;
                    S._pendingSelX = x; S._pendingSelY = y;
                    S.selPhase = 'none';
                }
            } else {
                S._pendingNewSel = true;
                S._pendingSelX = x; S._pendingSelY = y;
                S.selBuffer = null; S.selOffX = 0; S.selOffY = 0;
            }
            renderCanvas();
        }

        function selToolMove(x, y) {
            if (S._pendingNewSel) {
                if (x !== S._pendingSelX || y !== S._pendingSelY) {
                    S._pendingNewSel = false;
                    S.selPhase = 'selecting';
                    S.selX1 = S._pendingSelX; S.selY1 = S._pendingSelY;
                    S.selX2 = x; S.selY2 = y;
                    renderCanvas();
                }
                return;
            }
            if (S.selPhase === 'selecting') {
                S.selX2 = x; S.selY2 = y;
                renderCanvas();
            } else if (S.selPhase === 'moving') {
                S.selOffX = S._selBaseOffX + (x - S._selDragStartX);
                S.selOffY = S._selBaseOffY + (y - S._selDragStartY);
                renderCanvas();
            }
        }
        function selToolUp() {
            if (S._pendingNewSel) {
                S._pendingNewSel = false; renderCanvas(); return;
            }
            if (S.selPhase === 'moving') {
                S.selPhase = 'selected'; return;
            }
            if (S.selPhase === 'selecting') {
                if (S.selX1 === S.selX2 && S.selY1 === S.selY2) {
                    S.selPhase = 'none'; S.selBuffer = null;
                    renderCanvas(); return;
                }
                const nx = Math.min(S.selX1, S.selX2);
                const ny = Math.min(S.selY1, S.selY2);
                const nx2 = Math.max(S.selX1, S.selX2);
                const ny2 = Math.max(S.selY1, S.selY2);
                S.selNX = nx; S.selNY = ny; S.selNW = nx2 - nx + 1; S.selNH = ny2 - ny + 1;
                S.selOffX = 0; S.selOffY = 0;
                pushUndo();
                const frame = S.frames[S.currentFrameIdx];
                S.selBuffer = [];
                for (let r = ny; r <= ny2; r++) {
                    const row = [];
                    for (let c2 = nx; c2 <= nx2; c2++) {
                        row.push(frame[r] && frame[r][c2] ? frame[r][c2] : null);
                        if (frame[r]) frame[r][c2] = null;
                    }
                    S.selBuffer.push(row);
                }
                S.selPhase = 'selected';
                afterDraw();
            }
        }
        function commitSelection() {
            if (!S.selBuffer || S.selPhase === 'none') return;
            const frame = S.frames[S.currentFrameIdx];
            const dx = S.selNX + S.selOffX, dy = S.selNY + S.selOffY;
            for (let r = 0; r < S.selBuffer.length; r++)
                for (let c2 = 0; c2 < S.selBuffer[r].length; c2++) {
                    const col2 = S.selBuffer[r][c2]; if (!col2) continue;
                    const px = dx + c2, py = dy + r;
                    if (py >= 0 && py < S.gridH && px >= 0 && px < S.gridW) frame[py][px] = col2;
                }
            S.selPhase = 'none'; S.selBuffer = null; S.selOffX = 0; S.selOffY = 0;
            afterDraw();
        }

        function afterDraw() { renderCanvas(); updateThumb(S.currentFrameIdx); renderPreviews(); renderFrameLists(); }

        // ============================================================
        // マウス / タッチ イベント
        // ============================================================
        const mainCanvas = document.getElementById('main-canvas');
        mainCanvas.addEventListener('mousedown', e => { e.preventDefault(); handlePointerDown(e.clientX, e.clientY, e.button === 2); });
        mainCanvas.addEventListener('mousemove', e => handlePointerMove(e.clientX, e.clientY));
        mainCanvas.addEventListener('mouseup', e => handlePointerUp(e.clientX, e.clientY));
        mainCanvas.addEventListener('mouseleave', e => handlePointerUp(null, null));
        mainCanvas.addEventListener('contextmenu', e => e.preventDefault());

        let lastTouchDist = null;
        mainCanvas.addEventListener('touchstart', e => {
            e.preventDefault();
            if (e.touches.length === 2) {
                lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY);
                S.isDrawing = false; return;
            }
            handlePointerDown(e.touches[0].clientX, e.touches[0].clientY, false);
        }, { passive: false });
        mainCanvas.addEventListener('touchmove', e => {
            e.preventDefault();
            if (e.touches.length === 2) {
                const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY);
                if (lastTouchDist) {
                    const delta = dist - lastTouchDist;
                    if (Math.abs(delta) > 5) { S.cellSize = Math.max(2, Math.min(64, S.cellSize + (delta > 0 ? 1 : -1))); resizeCanvas(); }
                }
                lastTouchDist = dist; return;
            }
            lastTouchDist = null;
            if (e.touches.length === 1) handlePointerMove(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });
        mainCanvas.addEventListener('touchend', e => { e.preventDefault(); lastTouchDist = null; handlePointerUp(null, null); }, { passive: false });

        // ============================================================
        // ズーム
        // ============================================================
        mainCanvas.addEventListener('wheel', e => {
            e.preventDefault();
            S.cellSize = Math.max(2, Math.min(64, S.cellSize + (e.deltaY < 0 ? 1 : -1)));
            resizeCanvas();
        }, { passive: false });

        // ============================================================
        // ツール / グリッド / フリップ
        // ============================================================
        function selectTool(el) {
            commitSelection();
            const tool = el.dataset.tool;
            document.querySelectorAll('[data-tool]').forEach(b => b.classList.remove('active'));
            document.querySelectorAll(`[data-tool="${tool}"]`).forEach(b => b.classList.add('active'));
            S.tool = tool; S.linePreviewPx = []; renderCanvas();
        }
        function toggleGrid() {
            S.showGrid = !S.showGrid;
            document.querySelectorAll('.tool-cell, .mob-tool').forEach(el => {
                if (el.querySelector('.lbl')?.textContent.includes('グリッド')) {
                    el.classList.toggle('active', S.showGrid);
                }
            });
            renderCanvas();
        }
        function flipH() {
            pushUndo();
            const f = S.frames[S.currentFrameIdx];
            for (let y = 0; y < S.gridH; y++) f[y].reverse();
            afterDraw();
        }
        function flipV() {
            pushUndo();
            S.frames[S.currentFrameIdx].reverse();
            afterDraw();
        }
        function clearFrame() {
            if (!confirm('このフレームをクリアしますか？')) return;
            pushUndo();
            S.frames[S.currentFrameIdx] = createFrame(S.gridW, S.gridH);
            afterDraw();
        }

        // ============================================================
        // フレーム管理
        // ============================================================
        function addFrame() {
            S.frames.push(createFrame(S.gridW, S.gridH));
            S.currentFrameIdx = S.frames.length - 1;
            renderFrameLists(); renderCanvas(); renderPreviews();
        }
        function duplicateFrame() {
            const clone = cloneFrame(S.frames[S.currentFrameIdx]);
            S.frames.splice(S.currentFrameIdx + 1, 0, clone);
            S.currentFrameIdx++;
            renderFrameLists(); renderCanvas(); renderPreviews();
        }
        function deleteFrame(idx) {
            if (S.frames.length <= 1) return; // 最後の1コマは削除しない
            S.frames.splice(idx, 1);
            S.currentFrameIdx = Math.min(S.currentFrameIdx, S.frames.length - 1);
            renderFrameLists(); renderCanvas(); renderPreviews();
        }
        function selectFrame(idx) {
            S.currentFrameIdx = idx;
            renderFrameLists(); renderCanvas();
        }
        function moveFrame(idx, dir) {
            const target = idx + dir;
            if (target < 0 || target >= S.frames.length) return;
            const temp = S.frames[idx];
            S.frames[idx] = S.frames[target];
            S.frames[target] = temp;
            if (S.currentFrameIdx === idx) {
                S.currentFrameIdx = target;
            } else if (S.currentFrameIdx === target) {
                S.currentFrameIdx = idx;
            }
            renderFrameLists(); renderCanvas(); renderPreviews();
        }

        // ============================================================
        // アニメーション
        // ============================================================
        function toggleAnim() {
            if (S.animPlaying) stopAnim(); else startAnim();
        }
        function startAnim() {
            S.animPlaying = true;
            const fps = parseInt(document.getElementById('mob-fps')?.value || document.getElementById('pc-fps')?.value || 8);
            S.animTimer = setInterval(() => {
                S.animFrameIdx = (S.animFrameIdx + 1) % S.frames.length;
                renderPreviews();
            }, 1000 / fps);
            document.querySelectorAll('#mob-anim-btn, #pc-anim-btn').forEach(b => b.textContent = '⏹ 停止');
        }
        function stopAnim() {
            clearInterval(S.animTimer); S.animPlaying = false;
            document.querySelectorAll('#mob-anim-btn, #pc-anim-btn').forEach(b => b.textContent = '▶ 再生');
        }
        function restartAnim() { if (S.animPlaying) { stopAnim(); startAnim(); } }

        // ============================================================
        // カラーパレット
        // ============================================================
        function renderPalette() {
            ['mob-palette-grid', 'pc-palette-grid'].forEach(id => {
                const g = document.getElementById(id); if (!g) return;
                g.innerHTML = '';
                S.palette.forEach((col, i) => {
                    const d = document.createElement('div');
                    d.className = 'color-swatch' + (col === S.currentColor ? ' selected' : '');
                    d.style.background = col; d.title = col;
                    d.onclick = () => { S.currentColor = col; updateColorUI(); renderPalette(); };
                    g.appendChild(d);
                });
            });
        }
        function updateColorUI() {
            ['mob-color-box', 'pc-color-box'].forEach(id => { const el = document.getElementById(id); if (el) el.style.background = S.currentColor; });
        }
        function openColorPicker() {
            const inp = document.getElementById('color-picker-input');
            inp.value = S.currentColor; inp.click();
        }
        function onColorPickerChange(val) {
            S.currentColor = val; updateColorUI(); renderPalette();
        }
        function addCurrentColorToPalette() {
            if (!S.palette.includes(S.currentColor)) {
                S.palette.push(S.currentColor); renderPalette();
            }
        }
        function addAllUsedColorsToPalette() {
            let addedCount = 0;
            const usedColors = new Set();
            S.frames.forEach(f => {
                f.forEach(row => {
                    row.forEach(col => {
                        if (col) usedColors.add(col.toLowerCase());
                    });
                });
            });
            usedColors.forEach(c => {
                if (!S.palette.map(p => p.toLowerCase()).includes(c)) {
                    S.palette.push(c);
                    addedCount++;
                }
            });
            if (addedCount > 0) {
                renderPalette();
                alert(`${addedCount}色をパレットに追加しました！`);
            } else {
                alert('新しく追加する色はありませんでした。');
            }
        }
        function deletePaletteColor() {
            const idx = S.palette.indexOf(S.currentColor);
            if (idx === -1) { alert('このカラーはパレットにありません。'); return; }
            if (S.palette.length <= 1) { alert('パレットに1色以上必要です。'); return; }
            S.palette.splice(idx, 1);
            S.currentColor = S.palette[Math.min(idx, S.palette.length - 1)];
            updateColorUI(); renderPalette();
        }

        // ============================================================
        // タブ切り替え (モバイル)
        // ============================================================
        function switchTab(btn) {
            const pane = btn.dataset.pane;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('pane-' + pane)?.classList.add('active');
        }

        // ============================================================
        // SVG エクスポート
        // ============================================================
        function frameToSVGRects(frame) {
            const rects = [];
            for (let y = 0; y < frame.length; y++)
                for (let x = 0; x < frame[y].length; x++)
                    if (frame[y][x]) rects.push(`<rect x="${x}" y="${y}" width="1" height="1" fill="${frame[y][x]}"/>`);
            return rects.join('\n  ');
        }
        function wrapSVG(inner, w, h) {
            return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">\n  ${inner}\n</svg>`;
        }
        function setOutputAll(txt) {
            ['mob-export-output', 'pc-export-output'].forEach(id => { const el = document.getElementById(id); if (el) el.value = txt; });
        }
        function exportCurrentSVG() {
            const svg = wrapSVG(frameToSVGRects(S.frames[S.currentFrameIdx]), S.gridW, S.gridH);
            setOutputAll(svg); copyToClipboard(svg); alert('現在のコマのSVGをクリップボードにコピーしました！');
        }
        function exportSpritesheet() {
            const n = S.frames.length;
            const inner = S.frames.map((f, i) => `<g transform="translate(${i * S.gridW},0)">\n  ${frameToSVGRects(f)}\n</g>`).join('\n');
            const svg = wrapSVG(inner, S.gridW * n, S.gridH);
            setOutputAll(svg); copyToClipboard(svg); alert(`全${n}コマのスプライトシートをクリップボードにコピーしました！`);
        }
        function copyExport() {
            const v = document.getElementById('mob-export-output')?.value || document.getElementById('pc-export-output')?.value;
            if (!v) { alert('先にSVGを生成してください。'); return; }
            copyToClipboard(v); alert('コピーしました！');
        }
        function copyToClipboard(t) {
            navigator.clipboard.writeText(t).catch(() => {
                const a = document.createElement('textarea'); a.value = t; document.body.appendChild(a); a.select(); document.execCommand('copy'); document.body.removeChild(a);
            });
        }

        // ============================================================
        // SVGインポート
        // ============================================================
        function triggerImport() {
            const inp = document.getElementById('svg-import-input');
            inp.value = ''; inp.click();
        }
        function importSVG(input) {
            const file = input.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                try {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(ev.target.result, 'image/svg+xml');
                    const svgEl = doc.querySelector('svg');
                    if (!svgEl) { alert('SVGの解析に失敗しました。'); return; }
                    const vb = svgEl.getAttribute('viewBox').split(' ').map(Number);
                    if (!vb || vb.length < 4) { alert('viewBox が見つかりません。'); return; }
                    const totalW = Math.round(vb[2]), totalH = Math.round(vb[3]);
                    const allGroups = svgEl.querySelectorAll('g[transform]');
                    const groups = [...allGroups].filter(g => g.getAttribute('transform').includes('translate'));
                    if (groups.length > 0) {
                        const frameW = Math.round(totalW / groups.length), frameH = totalH;
                        const frames = groups.map(g => {
                            const frame = createFrame(frameW, frameH);
                            g.querySelectorAll('rect').forEach(r => applyRectToFrame(r, frame, 0, 0));
                            return frame;
                        });
                        loadImportedFrames(frames, frameW, frameH);
                    } else if (totalW > totalH && totalW % totalH === 0) {
                        const frameCount = totalW / totalH;
                        const frameW = totalH, frameH = totalH;
                        const frames = Array.from({ length: frameCount }, () => createFrame(frameW, frameH));
                        svgEl.querySelectorAll('rect').forEach(r => {
                            const rx = Math.round(parseFloat(r.getAttribute('x') || 0));
                            const fIdx = Math.floor(rx / frameW);
                            if (fIdx >= 0 && fIdx < frameCount) applyRectToFrame(r, frames[fIdx], fIdx * frameW, 0);
                        });
                        loadImportedFrames(frames, frameW, frameH);
                    } else {
                        const frame = createFrame(totalW, totalH);
                        svgEl.querySelectorAll('rect').forEach(r => applyRectToFrame(r, frame, 0, 0));
                        loadImportedFrames([frame], totalW, totalH);
                    }
                } catch (err) { alert('インポートエラー: ' + err.message); }
            };
            reader.readAsText(file);
        }
        function applyRectToFrame(rectEl, frame, ox, oy) {
            const x = Math.round(parseFloat(rectEl.getAttribute('x') || 0)) - ox;
            const y = Math.round(parseFloat(rectEl.getAttribute('y') || 0)) - oy;
            const w = Math.round(parseFloat(rectEl.getAttribute('width') || 1));
            const h = Math.round(parseFloat(rectEl.getAttribute('height') || 1));
            const fill = rectEl.getAttribute('fill');
            if (!fill || fill === 'none') return;
            for (let dy = 0; dy < h; dy++)
                for (let dx = 0; dx < w; dx++) {
                    const py = y + dy, px = x + dx;
                    if (py >= 0 && py < frame.length && px >= 0 && px < frame[0].length)
                        frame[py][px] = fill;
                }
        }
        function importFromText(textareaId) {
            const ta = document.getElementById(textareaId);
            const text = ta ? ta.value.trim() : '';
            if (!text) { alert('テキストエリアにSVGコードを貼り付けてください。'); return; }
            try {
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, 'image/svg+xml');
                const svgEl = doc.querySelector('svg');
                if (!svgEl) { alert('有効なSVGが見つかりませんでした。'); return; }
                const vb = svgEl.getAttribute('viewBox').split(' ').map(Number);
                if (!vb || vb.length < 4) { alert('viewBox が見つかりません。'); return; }
                const totalW = Math.round(vb[2]), totalH = Math.round(vb[3]);
                const allGroups = svgEl.querySelectorAll('g[transform]');
                const groups = [...allGroups].filter(g => g.getAttribute('transform').includes('translate'));
                if (groups.length > 0) {
                    const frameW = Math.round(totalW / groups.length), frameH = totalH;
                    const frames = groups.map(g => {
                        const frame = createFrame(frameW, frameH);
                        g.querySelectorAll('rect').forEach(r => applyRectToFrame(r, frame, 0, 0));
                        return frame;
                    });
                    loadImportedFrames(frames, frameW, frameH);
                } else if (totalW > totalH && totalW % totalH === 0) {
                    const frameCount = totalW / totalH;
                    const frameW = totalH, frameH = totalH;
                    const frames = Array.from({ length: frameCount }, () => createFrame(frameW, frameH));
                    svgEl.querySelectorAll('rect').forEach(r => {
                        const rx = Math.round(parseFloat(r.getAttribute('x') || 0));
                        const fIdx = Math.floor(rx / frameW);
                        if (fIdx >= 0 && fIdx < frameCount) applyRectToFrame(r, frames[fIdx], fIdx * frameW, 0);
                    });
                    loadImportedFrames(frames, frameW, frameH);
                } else {
                    const frame = createFrame(totalW, totalH);
                    svgEl.querySelectorAll('rect').forEach(r => applyRectToFrame(r, frame, 0, 0));
                    loadImportedFrames([frame], totalW, totalH);
                }
            } catch (err) { alert('インポートエラー: ' + err.message); }
        }
        function loadImportedFrames(frames, w, h) {
            S.gridW = w; S.gridH = h;
            S.frames = frames; S.currentFrameIdx = 0;
            S.undoStack = []; S.redoStack = [];
            const sel = document.getElementById('grid-size-select');
            const key = w + 'x' + h;
            if ([...sel.options].some(o => o.value === key)) sel.value = key;
            resizeCanvas(); renderFrameLists(); renderCanvas(); renderPreviews();
            const msg = '✅ インポート完了！ ' + frames.length + 'コマ (' + w + 'x' + h + ') を読み込みました。';
            ['mob-export-output', 'pc-export-output'].forEach(id => {
                const el = document.getElementById(id); if (el) el.value = msg;
            });
        }

        // ============================================================
        // キーボードショートカット
        // ============================================================
        document.addEventListener('keydown', e => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            if (e.key === 's' || e.key === 'S') { e.preventDefault(); const el = document.querySelector('[data-tool=select]'); if (el) selectTool(el); return; }
            if (e.key === 'Escape') { commitSelection(); return; }
            if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); return; }
            if (e.ctrlKey && (e.key === 'y' || e.key === 'Z')) { e.preventDefault(); redo(); return; }
            const map = { b: 'draw', e: 'erase', f: 'fill', k: 'picker', l: 'line', g: 'grid' };
            const t = map[e.key?.toLowerCase()];
            if (t) {
                if (t === 'grid') { toggleGrid(); return; }
                const el = document.querySelector(`[data-tool="${t}"]`);
                if (el) selectTool(el);
            }
        });

        // ============================================================
        // グリッドサイズ変更
        // ============================================================
        function changeGridSize(val) {
            if (!confirm('グリッドサイズを変更すると現在の内容がリセットされます。')) {
                document.getElementById('grid-size-select').value = `${S.gridW}x${S.gridH}`; return;
            }
            const [w, h] = val.split('x').map(Number);
            S.gridW = w; S.gridH = h;
            S.frames = [createFrame(w, h)]; S.currentFrameIdx = 0;
            S.undoStack = []; S.redoStack = [];
            resizeCanvas(); renderFrameLists(); renderCanvas(); renderPreviews();
        }

        // ============================================================
        // Undo / Redo
        // ============================================================
        function pushUndo() {
            S.undoStack.push(cloneAll());
            if (S.undoStack.length > 50) S.undoStack.shift();
            S.redoStack = [];
        }
        function undo() {
            if (!S.undoStack.length) return;
            S.redoStack.push(cloneAll());
            S.frames = S.undoStack.pop();
            S.currentFrameIdx = Math.min(S.currentFrameIdx, S.frames.length - 1);
            renderFrameLists(); renderCanvas(); renderPreviews();
        }
        function redo() {
            if (!S.redoStack.length) return;
            S.undoStack.push(cloneAll());
            S.frames = S.redoStack.pop();
            S.currentFrameIdx = Math.min(S.currentFrameIdx, S.frames.length - 1);
            renderFrameLists(); renderCanvas(); renderPreviews();
        }

        // ============================================================
        // フレームリスト描画
        // ============================================================
        function renderFrameLists() {
            ['pc-frame-list', 'mob-frame-list'].forEach(id => {
                const el = document.getElementById(id); if (!el) return;
                el.innerHTML = '';
                S.frames.forEach((frame, i) => {
                    const item = document.createElement('div');
                    item.className = 'frame-card' + (i === S.currentFrameIdx ? ' active' : '');
                    item.onclick = () => selectFrame(i);

                    const bg = document.createElement('div');
                    bg.className = 'frame-thumb-bg';
                    const cv = document.createElement('canvas');
                    cv.className = 'frame-thumb';
                    cv.width = S.gridW; cv.height = S.gridH;
                    drawPreviewToCanvas(cv, frame);
                    bg.appendChild(cv);

                    const lbl = document.createElement('span');
                    lbl.className = 'frame-lbl'; lbl.textContent = `コマ ${i + 1}`;

                    const actRow = document.createElement('div');
                    actRow.className = 'frame-actions-row';

                    const mvL = document.createElement('button');
                    mvL.className = 'frame-move-btn'; mvL.innerHTML = '◀';
                    mvL.disabled = i === 0;
                    mvL.onclick = e => { e.stopPropagation(); moveFrame(i, -1); };

                    const mvR = document.createElement('button');
                    mvR.className = 'frame-move-btn'; mvR.innerHTML = '▶';
                    mvR.disabled = i === S.frames.length - 1;
                    mvR.onclick = e => { e.stopPropagation(); moveFrame(i, 1); };

                    const del = document.createElement('button');
                    del.className = 'frame-del-btn'; del.innerHTML = '🗑';
                    del.onclick = e => { e.stopPropagation(); deleteFrame(i); };

                    actRow.appendChild(mvL); actRow.appendChild(del); actRow.appendChild(mvR);

                    item.appendChild(bg); item.appendChild(lbl); item.appendChild(actRow);
                    el.appendChild(item);
                });
            });
        }

        // ============================================================
        // 初期実行
        // ============================================================
        init();

    </script>
</body>
